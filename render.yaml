services:
  - type: web
    name: invisi-telemetry
    runtime: node
    region: oregon
    plan: free
    rootDir: nextjs-app
    buildCommand: npm install && npm install tsx
    startCommand: npx tsx telemetry/index.ts
    healthCheckPath: /health
    envVars:
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_TOPIC
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: REDIS_STREAM_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
